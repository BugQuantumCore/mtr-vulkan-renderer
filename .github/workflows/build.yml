name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: java-build
        path: build/libs/

  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Install Vulkan SDK (Linux)
      if: runner.os == 'Linux'
      run: |
        wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.4.313-noble.list https://packages.lunarg.com/vulkan/1.4.313/lunarg-vulkan-1.4.313-noble.list
        sudo apt update
        sudo apt install vulkan-sdk

    - name: Install Vulkan SDK (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        choco install -y vulkan-sdk
        # refresh environment variables added by Chocolatey packages
        refreshenv
        # try to read VULKAN_SDK env var set by the installer
        $sdkPath = $env:VULKAN_SDK
        if (-not $sdkPath) {
          # fallback: check C:\VulkanSDK for the newest installed version
          $vdirs = Get-ChildItem 'C:\VulkanSDK' -Directory -ErrorAction SilentlyContinue | Sort-Object Name -Descending
          if ($vdirs) { $sdkPath = $vdirs[0].FullName }
        }
        if (-not $sdkPath) { Write-Error 'Vulkan SDK not found after installation'; exit 1 }
        Write-Host "Found VULKAN_SDK: $sdkPath"
        Add-Content -Path $env:GITHUB_ENV -Value "VULKAN_SDK=$sdkPath"

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: cmake -B build-native -S . -DCMAKE_BUILD_TYPE=Release

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        if (-not $env:VULKAN_SDK) { Write-Error 'VULKAN_SDK is not set; aborting'; exit 1 }
        Write-Host "Using VULKAN_SDK=$env:VULKAN_SDK"
        cmake -B build-native -S . -DCMAKE_BUILD_TYPE=Release -DVulkan_INCLUDE_DIR="$env:VULKAN_SDK\Include" -DVulkan_LIBRARY="$env:VULKAN_SDK\Lib\vulkan-1.lib"

    - name: Build Native Library
      run: cmake --build build-native --config Release

    - name: Upload native library
      uses: actions/upload-artifact@v4
      with:
        name: native-${{ runner.os }}
        path: build-native/lib/

  test:
    needs: [build-java, build-native]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Run tests
      run: |
        echo "Tests would run here"
        # ./gradlew test